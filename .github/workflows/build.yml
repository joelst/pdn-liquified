name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      NUGET_XMLDOC_MODE: skip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify .NET 9 SDK is available on runner
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $hasNet9 = dotnet --list-sdks | Select-String '^9\.'
          if (-not $hasNet9) {
            throw 'Required .NET 9 SDK was not found on this runner image.'
          }

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props',
            '**/*.targets', '**/global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Download Paint.NET portable
        id: paintdotnet
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/paintdotnet/release/releases/latest' -Headers @{ 'User-Agent' = 'pdn-liquified-ci' }
          $asset = $release.assets | Where-Object { $_.name -match 'portable\.x64\.zip$' } | Select-Object -First 1
          if (-not $asset) {
            throw 'Could not find a portable x64 Paint.NET asset in latest release.'
          }

          $zipPath = Join-Path $env:RUNNER_TEMP $asset.name
          $extractPath = Join-Path $env:RUNNER_TEMP 'paintdotnet'

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zipPath
          if (Test-Path $extractPath) {
            Remove-Item -Path $extractPath -Recurse -Force
          }
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          $requiredDlls = @(
            'PaintDotNet.Base.dll',
            'PaintDotNet.ComponentModel.dll',
            'PaintDotNet.Core.dll',
            'PaintDotNet.Effects.Core.dll',
            'PaintDotNet.Effects.Gpu.dll',
            'PaintDotNet.Fundamentals.dll',
            'PaintDotNet.Framework.dll',
            'PaintDotNet.Primitives.dll',
            'PaintDotNet.ObjectModel.dll',
            'PaintDotNet.PropertySystem.dll',
            'PaintDotNet.Windows.dll',
            'PaintDotNet.Windows.Core.dll',
            'PaintDotNet.Windows.Framework.dll'
          )

          foreach ($dll in $requiredDlls) {
            $path = Join-Path $extractPath $dll
            if (-not (Test-Path $path)) {
              throw "Missing required Paint.NET assembly: $dll"
            }
          }

          "PDN_ROOT=$extractPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "pdn_root=$extractPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore LiquifiedPlugins.slnx /p:PdnRoot="$env:PDN_ROOT"

      - name: Build (Release)
        shell: pwsh
        run: |
          dotnet build LiquifiedPlugins.slnx -c Release --no-restore /p:PdnRoot="$env:PDN_ROOT"

      - name: Upload plugin DLL artifacts (Release)
        uses: actions/upload-artifact@v4
        with:
          name: plugin-dlls-release
          path: |
            Liquified/bin/Release/net9.0-windows/LiquifiedPlugin.dll
            GridWarp/bin/Release/net9.0-windows/GridWarpPlugin.dll
            DocumentRectify/bin/Release/net9.0-windows/DocumentRectifyPlugin.dll
          if-no-files-found: error

      - name: Create release package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dist = Join-Path $env:RUNNER_TEMP 'release-package'

          if (Test-Path $dist) {
            Remove-Item -Path $dist -Recurse -Force
          }

          New-Item -ItemType Directory -Path $dist | Out-Null

          $filesToCopy = @(
            'Liquified/bin/Release/net9.0-windows/LiquifiedPlugin.dll',
            'GridWarp/bin/Release/net9.0-windows/GridWarpPlugin.dll',
            'DocumentRectify/bin/Release/net9.0-windows/DocumentRectifyPlugin.dll',
            'install-plugins.bat',
            'install-plugins.ps1',
            'INSTALL.md',
            'README.md',
            'LICENSE'
          )

          foreach ($file in $filesToCopy) {
            if (-not (Test-Path $file)) {
              throw "Missing file for release package: $file"
            }

            Copy-Item -Path $file -Destination $dist -Force
          }

          "RELEASE_PACKAGE_DIR=$dist" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: pdn-liquified-release
          path: ${{ env.RELEASE_PACKAGE_DIR }}/
          if-no-files-found: error
